model_name: orbit_mlp_18.pt

norm_path: "orbit_norm_data_8.json"
val_data_path: "validation_data_8"
test_data_path: "test_data_8"
training_data_path: "training_data_8"

hidden_layers: [512, 512, 256, 256, 128]
epochs: 150
batch_size: 102400

use_half_precision: True # [True,False]
use_dataloader: False # [True,False]
use_gradient_clipping: False

grad_clip_max_norm: 0.1
optimizer: adam # [adam, adamW]

runs:
  1:
    epochs: 10
    training_data_filter: /orbit_train_*.npy
    start_learning_rate: 0.0001
    min_learning_rate: 0.000001
    scheduler: plateau
    patience: 15
  2:
    override_learning_rate: True
    training_data_filter: /orbit_train_*.npy
    start_learning_rate: 0.001
    min_learning_rate: 0.000001
    scheduler: plateau
    patience: 15
